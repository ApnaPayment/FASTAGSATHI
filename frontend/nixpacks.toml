[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = [
  "npm run build",
  "curl -fsSL 'https://github.com/caddyserver/caddy/releases/download/v2.9.1/caddy_2.9.1_linux_amd64.tar.gz' | tar -xz caddy && chmod +x caddy"
]

[start]
cmd = "/app/caddy run --config /app/Caddyfile --adapter caddyfile"
